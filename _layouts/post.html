---
layout: default
---

<article class="post">
  <header class="post-header">
    <p class="post-eyebrow">{{ page.date | date: "%B %d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="post-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
