---
layout: default
title: Archive
permalink: /archive/
---

<section class="post">
  <h1>Archive</h1>
  <div class="post-list">
    {% for post in site.posts %}
      <article class="post-card">
        <div class="post-meta">{{ post.date | date: "%B %d, %Y" }}</div>
        <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
        {% if post.subtitle %}
          <p>{{ post.subtitle }}</p>
        {% endif %}
      </article>
    {% endfor %}
  </div>
</section>
